<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Bio-Extreme 30/30</title>
    <style>
        body { 
            font-family: 'Arial Black', sans-serif; 
            background: #000 url('https://img.freepik.com') fixed center;
            background-size: cover; color: #fff; margin: 0; padding: 20px; overflow-x: hidden;
        }
        .container { 
            max-width: 800px; background: rgba(0, 0, 0, 0.9); margin: auto; 
            padding: 30px; border: 4px solid #ff0000; border-radius: 20px;
            box-shadow: 0 0 40px #f00; position: relative;
        }
        .header-msg {
            text-align: center; color: #ffea00; font-size: 35px;
            text-transform: uppercase; margin-bottom: 20px;
            text-shadow: 0 0 20px #ffea00, 2px 2px #000;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0.7; transform: scale(1.02); } }
        
        .question { margin-bottom: 30px; padding: 15px; border-bottom: 2px solid #400; background: rgba(50,0,0,0.3); }
        .options label { 
            display: block; margin: 10px 0; padding: 12px;
            background: #1a0000; border: 1px solid #600; border-radius: 8px;
            cursor: pointer; transition: 0.2s;
        }
        .options label:hover { background: #800; border-color: #f00; }
        
        .blood-drop {
            position: absolute; width: 12px; height: 12px; background: #f00;
            border-radius: 50%; pointer-events: none; z-index: 9999;
        }

        button { 
            background: #ff0000; color: white; border: none; padding: 20px; 
            width: 100%; border-radius: 10px; cursor: pointer; font-size: 25px; font-weight: bold;
            box-shadow: 0 5px 15px #600;
        }
        button:hover { background: #b30000; transform: translateY(-3px); }

        #result { 
            display: none; margin-top: 30px; padding: 30px; text-align: center; 
            font-size: 40px; border: 5px solid red; background: #000;
        }
        .darwin-float { position: fixed; bottom: 10px; right: 10px; width: 150px; opacity: 0.5; z-index: -1; }
    </style>
</head>
<body onclick="spawnBlood(event)">

<img src="https://upload.wikimedia.org" class="darwin-float">

<div class="container">
    <div class="header-msg">УВЕРЕНСЫҢ БА 30/30-ҒА, БАУЫРЫМ? 🔥</div>
    <div id="quiz"></div>
    <button onclick="checkQuiz()">НӘТИЖЕНІ КӨРУ</button>
    <div id="result"></div>
</div>

<script>
    function spawnBlood(e) {
        for (let i = 0; i < 10; i++) {
            const drop = document.createElement('div');
            drop.className = 'blood-drop';
            drop.style.left = e.pageX + 'px';
            drop.style.top = e.pageY + 'px';
            document.body.appendChild(drop);
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 120 + 40;
            drop.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(${Math.cos(angle)*velocity}px, ${Math.sin(angle)*velocity}px) scale(0)`, opacity: 0 }
            ], { duration: 500 }).onfinish = () => drop.remove();
        }
    }

    const questions = [
        { q: "Фотосинтез қай органоидта жүреді?", a: ["Митохондрия", "Рибосома", "Хлоропласт", "Лизосома"], r: 2 },
        { q: "Адам денесіндегі ең ірі без?", a: ["Ұйқы безі", "Бауыр", "Қалқанша без", "Гипофиз"], r: 1 },
        { q: "ДНҚ құрылымын кімдер ашты?", a: ["Мендель", "Павлов", "Уотсон мен Крик", "Дарвин"], r: 2 },
        { q: "Қан тамырларының ең жіңішке түрі?", a: ["Артерия", "Вена", "Капилляр", "Аорта"], r: 2 },
        { q: "Жасушаның энергия станциясы?", a: ["Ядро", "Митохондрия", "Гольджи аппараты", "ЭПТ"], r: 1 },
        { q: "Генетиканың негізін салушы?", a: ["Г. Мендель", "Ч. Дарвин", "Л. Пастер", "И. Мечников"], r: 0 },
        { q: "Балықтар немен тыныс алады?", a: ["Өкпе", "Тері", "Желбезек", "Трахея"], r: 2 },
        { q: "Нәруыз синтезі қайда жүреді?", a: ["Ядро", "Рибосома", "Вакуоль", "Цитоплазма"], r: 1 },
        { q: "Адамда неше жұп хромосома бар?", a: ["46 жұп", "22 жұп", "23 жұп", "44 жұп"], r: 2 },
        { q: "Микология нені зерттейді?", a: ["Жануарларды", "Саңырауқұлақтарды", "Өсімдіктерді", "Вирустарды"], r: 1 },
        { q: "Эритроциттер қайда түзіледі?", a: ["Жүректе", "Бауырда", "Қызыл сүйек кемігінде", "Мида"], r: 2 },
        { q: "Биосфера туралы ілімнің авторы?", a: ["В. Вернадский", "К. Линней", "Ж. Ламарк", "А. Гумбольдт"], r: 0 },
        { q: "Асқорыту қай жерден басталады?", a: ["Өңеш", "Асқазан", "Ауыз қуысы", "Ішек"], r: 2 },
        { q: "Жануар жасушасында болмайтын құрылым?", a: ["Ядро", "Митохондрия", "Жасуша қабырғасы", "Мембрана"], r: 2 },
        { q: "Вирустарды ашқан ғалым?", a: ["Д. Ивановский", "Р. Кох", "И. Павлов", "И. Мечников"], r: 0 },
        { q: "Ең кіші тірі ағзалық бірлік?", a: ["Тіндер", "Мүше", "Жасуша", "Жүйе"], r: 2 },
        { q: "Мутациялық өзгергіштік терминін кім енгізді?", a: ["Г. Мендель", "Г. де Фриз", "Ч. Дарвин", "Т. Морган"], r: 1 },
        { q: "Адам жүрегі неше камералы?", a: ["2", "3", "4", "5"], r: 2 },
        { q: "Инсулин қай безден бөлінеді?", a: ["Бауыр", "Ұйқы безі", "Бүйрек", "Гипофиз"], r: 1 },
        { q: "Сүйекке иілгіштік беретін зат?", a: ["Минералды", "Органикалық", "Тұздар", "Су"], r: 1 },
        { q: "Фотосинтездің жарық фазасында бөлінетін газ?", a: ["CO2", "O2", "N2", "H2"], r: 1 },
        { q: "Құс қанаты мен адам қолы қандай мүшелер?", a: ["Аналогтық", "Гомологтық", "Рудимент", "Атавизм"], r: 1 },
        { q: "Эволюцияның қозғаушы күші?", a: ["Мутация", "Табиғи сұрыпталу", "Климат", "Көшу"], r: 1 },
        { q: "Бүйректің бірлігі?", a: ["Нейрон", "Нефрон", "Аксон", "Альвеола"], r: 1 },
        { q: "Сперматозоидты алғаш көрген кім?", a: ["Р. Гук", "А. Левенгук", "Т. Шванн", "М. Шлейден"], r: 1 },
        { q: "Прокариоттарға не жатады?", a: ["Саңырауқұлақ", "Бактерия", "Өсімдік", "Вирус"], r: 1 },
        { q: "Өсімдіктің вегетативті мүшесі?", a: ["Гүл", "Сабақ", "Тұқым", "Жеміс"], r: 1 },
        { q: "Экология терминін кім енгізді?", a: ["Э. Геккель", "Ч. Дарвин", "В. Вернадский", "А. Тенсли"], r: 0 },
        { q: "Жүйке жасушасы қалай аталады?", a: ["Миоцит", "Нейрон", "Лейкоцит", "Остеоцит"], r: 1 },
        { q: "Дарвин бойынша түрлердің өзгеру себебі?", a: ["Тұқым қуалау", "Өзгергіштік", "Табиғи сұрыпталу", "Барлығы"], r: 3 }
    ];

    const labels = ["А", "Б", "С", "Д"];
    const quizBox = document.getElementById('quiz');
    questions.forEach((item, i) => {
        let opts = item.a.map((opt, idx) => `<label><input type="radio" name="q${i}" value="${idx}"> ${labels[idx]}) ${opt}</label>`).join('');
        quizBox.innerHTML += `<div class="question"><p><strong>${i+1}. ${item.q}</strong></p>${opts}</div>`;
    });

    function checkQuiz() {
        let score = 0;
        questions.forEach((item, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if (sel && parseInt(sel.value) === item.r) score++;
        });
        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        if (score < 10) {
            resDiv.innerHTML = `ҰПАЙ: ${score}/30<br>СЕН ТУПОЙЙЙЙЙ! 💀`;
            resDiv.style.color = 'red';
        } else {
            resDiv.innerHTML = `ҰПАЙ: ${score}/30<br>ЖАРАЙСЫҢ, БАУЫРЫМ! 🔥🦍`;
            resDiv.style.color = '#0f0';
        }
        window.scrollTo(0, 0);
    }
</script>
</body>
</html>
