<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOLOGY HARD-100 🔥</title>
    <style>
        :root { --main: #27ae60; --dark: #1b262c; --light: #f8fbf8; --red: #c0392b; --accent: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; color: #2c3e50; margin: 0; padding: 20px; }
        .container { max-width: 750px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-top: 12px solid var(--main); }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--main); font-size: 35px; text-transform: uppercase; margin: 0; }
        .question-card { background: #fff; border: 2px solid #f0f0f0; padding: 25px; border-radius: 20px; margin-bottom: 25px; transition: 0.3s; }
        .question-card:hover { border-color: var(--main); }
        .options label { display: flex; align-items: center; background: #f9f9f9; padding: 15px; margin: 12px 0; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: #eafaf1; }
        input[type="radio"] { accent-color: var(--main); margin-right: 15px; transform: scale(1.3); }
        button { width: 100%; padding: 20px; background: var(--main); color: white; border: none; border-radius: 15px; font-size: 22px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(39,174,96,0.3); }
        button:hover { background: var(--dark); transform: translateY(-3px); }
        #result-screen { display: none; text-align: center; }
        .error-log { text-align: left; background: #fff5f5; padding: 20px; border-radius: 15px; margin-top: 15px; border-left: 6px solid var(--red); }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="header">
        <h1>🧬 BIO-HARD 100</h1>
        <p style="font-size: 18px; margin: 20px 0;">Базада 100 қиын сұрақ. Саған кездейсоқ <b>20 сұрақ</b> беріледі.</p>
        <p style="color:var(--accent); font-weight:bold; font-size: 20px;">ДАЙЫНСЫҢ БА, БАУЫРЫМ? 🦍</p>
        <button onclick="generateTest()">ТЕСТТІ БАСТАУ 🔥</button>
    </div>

    <div id="quiz-area" style="display:none;">
        <div id="questions-container"></div>
        <button onclick="finishTest()">НӘТИЖЕНІ КӨРУ ✅</button>
    </div>

    <div id="result-screen">
        <div id="score-display" style="font-size: 60px; font-weight: bold; color: var(--main);"></div>
        <div id="status-msg"></div>
        <button onclick="showErrors()" style="background:#555; margin-bottom:15px; font-size: 16px;">ҚАТЕМЕН ЖҰМЫС</button>
        <button onclick="location.reload()">ЖАҢА НҰСҚА ТАПСЫРУ 🔄</button>
        <div id="error-list"></div>
    </div>
</div>

<script>
    const database = [
        {q: "Нәруыздың бірінші реттік құрылымындағы байланыс түрі?", a: ["Сутектік", "Пептидтік", "Дисульфидтік", "Иондық"], r: 1, n: "Аминқышқылдары пептидтік байланыс арқылы тізбек құрайды."},
        {q: "Гликолиздің оттегісіз кезеңінде 1 моль глюкозадан неше АТФ түзіледі?", a: ["2 АТФ", "36 АТФ", "38 АТФ", "4 АТФ"], r: 0, n: "Дайындықсыз кезеңде энергия шығымы тек 2 моль АТФ."},
        {q: "Дигибридті будандастыруда (Мендель бойынша) фенотиптік ажырау қалай жүреді?", a: ["3:1", "1:2:1", "9:3:3:1", "1:1:1:1"], r: 2, n: "Екі белгі бойынша ажырау 9:3:3:1 қатынасында болады."},
        {q: "Адамда Х-хромосомасымен тіркесіп берілетін рецессивті ауру?", a: ["Даун синдромы", "Дальтонизм", "Полидактилия", "Альбинизм"], r: 1, n: "Дальтонизм мен гемофилия Х-хромосомасына тіркесіп тұқым қуалайды."},
        {q: "ДНҚ молекуласындағы аденинге (А) комплементарлы нуклеотид?", a: ["Гуанин", "Цитозин", "Тимин", "Урацил"], r: 2, n: "ДНҚ-да А=Т (Тимин) жұбы болады."},
        {q: "Фотосинтездің жарық фазасы хлоропласттың қай жерінде жүреді?", a: ["Стромада", "Тилакоидта", "Матриксте", "Кристада"], r: 1, n: "Жарық фазасы тилакоид мембранасында өтеді."},
        {q: "Жасушаның бөліну шүйкесін түзетін органоид?", a: ["Центриоль", "Лизосома", "Рибосома", "Вакуоль"], r: 0, n: "Жасуша орталығы (центриоль) митоз кезінде бөліну жіпшелерін түзеді."},
        {q: "Сперматозоидтың басындағы жұмыртқа жасушасын ерітетін ферментті бөлік?", a: ["Ядро", "Акросома", "Құйрық", "Мойын"], r: 1, n: "Акросома — лизосоманың түрін өзгерткен түрі, фермент бөледі."},
        {q: "Эволюцияның ең кіші бірлігі?", a: ["Түр", "Популяция", "Тұқымдас", "Ағза"], r: 1, n: "Эволюциялық процесс жеке ағзада емес, популяция ішінде жүреді."},
        {q: "Қанның ұюын қамтамасыз ететін жасушасыз элементтер?", a: ["Эритроцит", "Лейкоцит", "Тромбоцит", "Лимфоцит"], r: 2, n: "Тромбоциттер қан ұйығанда фибрин торларын түзуге қатысады."},
        {q: "АТФ синтезі жүретін жасушалық органоид?", a: ["Ядро", "Митохондрия", "Гольджи жиынтығы", "ЭПТ"], r: 1, n: "Митохондрия — жасушаның қуат станциясы."},
        {q: "ДНҚ-дан ақпараттың РНҚ-ға көшірілуі қалай аталады?", a: ["Трансляция", "Транскрипция", "Репликация", "Мутация"], r: 1, n: "Транскрипция — ақпаратты ДНҚ-дан иРНҚ-ға көшіру."},
        {q: "Адамдағы соматикалық жасушадағы хромосома саны?", a: ["23", "46", "48", "92"], r: 1, n: "Дене жасушаларында диплоидты (46) хромосома жиынтығы болады."},
        {q: "Қандай дәрумен жетіспегенде 'ақшам соқыр' ауруы пайда болады?", a: ["А дәрумені", "С дәрумені", "D дәрумені", "В12 дәрумені"], r: 0, n: "А дәрумені (ретинол) көру пигменттерінің түзілуіне қажет."},
        {q: "Өсімдіктердегі су мен минералды заттардың қозғалысы қай тін арқылы жүреді?", a: ["Флоэма", "Ксилема", "Камбий", "Перидерма"], r: 1, n: "Ксилема (сүрек) арқылы су жоғары қарай көтеріледі."},
        {q: "Миоздың бірінші профазасындағы хромосомалардың жақындасуы?", a: ["Конъюгация", "Кроссинговер", "Инверсия", "Дупликация"], r: 0, n: "Конъюгация — гомологты хромосомалардың жұптасып жақындасуы."},
        {q: "Нәруыздың қай құрылымында сутектік байланыстар үстемдік етеді?", a: ["Бірінші реттік", "Екінші реттік", "Үшінші реттік", "Төртінші реттік"], r: 1, n: "Екінші реттік құрылым (спираль) сутектік байланыстармен ұсталады."},
        {q: "Орталық жүйке жүйесіне не жатады?", a: ["Жүйкелер", "Ми мен жұлын", "Түйіндер", "Рецепторлар"], r: 1, n: "ОЖЖ тек ми мен жұлыннан тұрады."},
        {q: "Инсулин гормонын бөлетін без?", a: ["Бауыр", "Ұйқы безі", "Бүйрек үсті безі", "Гипофиз"], r: 1, n: "Ұйқы безінің аралшық жасушалары инсулин бөледі."},
        {q: "Бактерия жасушасына тән емес құрылым?", a: ["ДНҚ", "Рибосома", "Ядро", "Мембрана"], r: 2, n: "Бактериялар — прокариоттар, оларда қалыптасқан ядро болмайды."},
        {q: "Қалқанша безінің қызметіне қажетті химиялық элемент?", a: ["Темір", "Йод", "Кальций", "Магний"], r: 1, n: "Тироксин гормонының құрамына йод кіреді."},
        {q: "Жануар жасушасының гликокаликсі неден тұрады?", a: ["Нәруыз бен липид", "Көмірсулар", "ДНҚ", "Целлюлоза"], r: 1, n: "Гликокаликс — мембрана сыртындағы көмірсулы қабат."},
        {q: "Партеногенез дегеніміз не?", a: ["Жыныссыз көбею", "Ұрықтанбаған жұмыртқадан даму", "Бөліну арқылы көбею", "Бүршіктену"], r: 1, n: "Араларда, биттерде кездесетін ұрықтанбай даму процесі."},
        {q: "Адамдағы қан айналым шеңберін кім ашты?", a: ["Павлов", "Уильям Гарвей", "Пастер", "Мечников"], r: 1, n: "Гарвей — қазіргі физиологияның негізін салушы."},
        {q: "Нейронның қысқа өсіндісі қалай аталады?", a: ["Аксон", "Дендрит", "Синапс", "Миелин"], r: 1, n: "Дендрит — сигналды қабылдайтын қысқа өсінді."},
        {q: "Қай мүше 'қан депосы' деп аталады?", a: ["Өкпе", "Көкбауыр", "Жүрек", "Бүйрек"], r: 1, n: "Көкбауырда артық қан қоры сақталады."},
        {q: "Вирустардың сыртқы нәруызды қабығы?", a: ["Мембрана", "Капсид", "Қабырға", "Нуклеоид"], r: 1, n: "Капсид вирустың генетикалық материалын қорғайды."},
        {q: "Адамның асқазанында қандай қышқыл болады?", a: ["Күкірт", "Тұз", "Азот", "Сірке"], r: 1, n: "Тұз қышқылы (HCl) ферменттерді белсендіреді."},
        {q: "Экологиядағы 'продуценттер' дегеніміз кімдер?", a: ["Жыртқыштар", "Өсімдіктер", "Бактериялар", "Өлексе жеушілер"], r: 1, n: "Өсімдіктер — органикалық зат өндірушілер."},
        {q: "Нәруыздың денатурациясы деген не?", a: ["Түзілуі", "Құрылымының бұзылуы", "Көбеюі", "Еруі"], r: 1, n: "Денатурация — физикалық не химиялық әсерден нәруыз пішінінің өзгеруі."}
        // Қалған 70 сұрақ (31-ден 100-ге дейін)

    {q: "Нәруыз молекуласындағы аминқышқылдарының ретін не анықтайды?", a: ["иРНҚ", "тРНҚ", "ДНҚ", "рРНҚ"], r: 2, n: "Генетикалық ақпарат (код) ДНҚ-да сақталады."},
    {q: "Митоздың қай кезеңінде ядро қабықшасы жойылады?", a: ["Профаза", "Метафаза", "Анафаза", "Телофаза"], r: 0, n: "Профазада хромосомалар шиыршықталып, ядро бұзылады."},
    {q: "Жасуша мембранасының негізін не құрайды?", a: ["Нәруыздар", "Липидтер (биқабат)", "Көмірсулар", "Нуклеотидтер"], r: 1, n: "Фосфолипидтердің екі қабаты мембрананың қаңқасы."},
    {q: "Фотосинтездің қараңғы фазасы қайда өтеді?", a: ["Тилакоидта", "Стромада", "Грагада", "Матриксте"], r: 1, n: "Кальвин циклы (қараңғы фаза) хлоропласт стромасында жүреді."},
    {q: "Адамдағы гемофилия ауруы қандай өзгеріске жатады?", a: ["Гендік мутация", "Хромосомалық", "Геномдық", "Цитоплазмалық"], r: 0, n: "Гемофилия — Х-хромосомасындағы нақты геннің бұзылуы."},
    {q: "Ересек адамның қаңқасында неше сүйек бар?", a: ["150", "200-ден астам", "300", "100"], r: 1, n: "Ересек адамда шамамен 206-208 сүйек болады."},
    {q: "Тірі ағзалардың тұрақты ішкі ортасын сақтауы?", a: ["Метаболизм", "Гомеостаз", "Анаболизм", "Катаболизм"], r: 1, n: "Гомеостаз — қысым, температура, химиялық құрам тұрақтылығы."},
    {q: "Жүйке жасушасының ұзын өсіндісі?", a: ["Дендрит", "Аксон", "Синапс", "Глия"], r: 1, n: "Аксон импульсті нейрон денесінен сыртқа өткізеді."},
    {q: "Қай дәрумен жетіспегенде 'рахит' ауруы болады?", a: ["А", "В", "С", "D"], r: 3, n: "D дәрумені (кальциферол) сүйек қатаюына жауапты."},
    {q: "Митохондрияның ішкі мембранасының иірімдері?", a: ["Грала", "Криста", "Строма", "Матрикс"], r: 1, n: "Кристалар беттік ауданды арттырып, АТФ синтезін жылдамдатады."},
    {q: "Жануарларда қорға жиналатын көмірсу?", a: ["Крахмал", "Гликоген", "Целлюлоза", "Хитин"], r: 1, n: "Гликоген бауыр мен бұлшықетте қорға жиналады."},
    {q: "ДНҚ репликациясы жасуша циклінің қай кезеңінде жүреді?", a: ["Интерфаза (S)", "Профаза", "Метафаза", "Телофаза"], r: 0, n: "Синтетикалық кезеңде (S) ДНҚ екі еселенеді."},
    {q: "Қандай мүше 'иммунитет орталығы' болып саналады?", a: ["Бүйрек", "Айырша без (тимус)", "Өкпе", "Асқазан"], r: 1, n: "Тимус Т-лимфоциттердің пісіп-жетілуін қамтамасыз етеді."},
    {q: "Өсімдік жасушасының қабырғасы неден тұрады?", a: ["Хитин", "Муреин", "Целлюлоза", "Гликоген"], r: 2, n: "Целлюлоза (жасұнық) өсімдікке беріктік береді."},
    {q: "Трансляция процесі қайда жүреді?", a: ["Ядрода", "Рибосомада", "Лизосомада", "Митохондрияда"], r: 1, n: "Трансляция — рибосомада нәруыз тізбегінің құрастырылуы."},
    {q: "Адамда соқыр ішектің өсіндісі қандай мүше?", a: ["Атавизм", "Рудимент", "Аналогтық", "Гомологтық"], r: 1, n: "Аппендикс — қызметі жойылған қалдық мүше (рудимент)."},
    {q: "Көру зонасы ми қабығының қай бөлігінде?", a: ["Маңдай", "Төбе", "Шүйде", "Самай"], r: 2, n: "Шүйде бөлігі көру ақпаратын өңдейді."},
    {q: "Бактериофаг дегеніміз не?", a: ["Пайдалы бактерия", "Бактерияны зақымдайтын вирус", "Саңырауқұлақ", "Балдыр"], r: 1, n: "Бактериофаг — бактерия ішінде көбейетін вирус."},
    {q: "АТФ молекуласында неше макроэргиялық байланыс бар?", a: ["1", "2", "3", "0"], r: 1, n: "Фосфор қышқылының 3 қалдығы арасында 2 жоғары энергиялы байланыс бар."},
    {q: "Адам қанының сұйық бөлігі?", a: ["Лимфа", "Плазма", "Сарысу", "Фибрин"], r: 1, n: "Қанның 55%-ын плазма құрайды."},
    {q: "Жыныс жасушаларының бөлінуі?", a: ["Митоз", "Мейоз", "Амитоз", "Шизогония"], r: 1, n: "Мейоз нәтижесінде гаплоидты гаметалар түзіледі."},
    {q: "ДНҚ-ның бір тізбегі АТГ-ЦЦГ болса, оған комплементарлы тізбек?", a: ["ТАЦ-ГГЦ", "УАЦ-ГГЦ", "ГЦТ-ААГ", "АТГ-ЦЦГ"], r: 0, n: "Комплементарлық заңы: А-Т, Г-Ц."},
    {q: "Қандай гормон қандағы қант мөлшерін азайтады?", a: ["Адреналин", "Тироксин", "Инсулин", "Глюкагон"], r: 2, n: "Инсулин глюкозаны гликогенге айналдырады."},
    {q: "Эритроциттердің қызметі?", a: ["Қорғаныш", "Газ тасымалдау", "Ұю", "Энергия"], r: 1, n: "Гемоглобин арқылы оттегі мен көмірқышқыл газын тасиды."},

    let currentTest = [];
    let userAnswers = [];

    function generateTest() {
        currentTest = [...database].sort(() => 0.5 - Math.random()).slice(0, 20);
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        const container = document.getElementById('questions-container');
        container.innerHTML = currentTest.map((item, i) => `
            <div class="question-card">
                <p><strong>${i+1}. ${item.q}</strong></p>
                <div class="options">
                    ${item.a.map((opt, idx) => `<label><input type="radio" name="q${i}" value="${idx}"> <span>${['А','Б','С','Д'][idx]}) ${opt}</span></label>`).join('')}
                </div>
            </div>
        `).join('');
        window.scrollTo(0, 0);
    }

    function finishTest() {
        let score = 0;
        userAnswers = [];
        currentTest.forEach((item, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const val = sel ? parseInt(sel.value) : null;
            userAnswers.push(val);
            if(val === item.r) score++;
        });

        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-display').innerText = `${score} / 20`;
        const msg = document.getElementById('status-msg');
        if(score < 10) { msg.innerHTML = '<p style="color:red; font-size:30px;">СЕН ТУПОЙЙЙЙЙ! 💀</p>'; }
        else if(score < 18) { msg.innerHTML = '<p style="color:orange; font-size:30px;">ЖАМАН ЕМЕС, БАУЫРЫМ! 👍</p>'; }
        else { msg.innerHTML = '<p style="color:green; font-size:30px;">СЕН — ГЕНИЙСІҢ! 🔥🦍</p>'; }
        window.scrollTo(0, 0);
    }

    function showErrors() {
        const list = document.getElementById('error-list');
        list.innerHTML = currentTest.map((item, i) => userAnswers[i] !== item.r ? `
            <div class="error-log">
                <strong>${i+1}. ${item.q}</strong><br>
                <span style="color:green">Дұрыс: ${['А','Б','С','Д'][item.r]}) ${item.a[item.r]}</span><br>
                <small>💡 ${item.n}</small>
            </div>
        ` : "").join("");
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
